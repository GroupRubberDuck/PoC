{% extends 'layouts/base.html' %}

{% block head %}
<script src="{{ url_for('static', filename='d3.v7.min.js') }}"></script>
{% endblock %}

{% block content %}
<form>
    <select id="asset-select">
        {% for id, asset in assets %}
        {% if id == selected_asset-1 %}
        <option value="{{ id + 1 }}" selected>{{ asset }}</option>
        {% else %}
        <option value="{{ id + 1 }}">{{ asset }}</option>
        {% endif %}
        {% endfor %}
    </select>
</form>

<div id="tree-container">
    <svg id="tree-svg"></svg>
</div>

<div class="buttons">
    {% if back_link != "" %}
    <a href="{{ back_link }}" class="btnBack">Indietro</a>
    {% endif %}
    {% if forward_link != "" %}
    <a href="{{ forward_link }}" class="btnForward">Avanti</a>
    {% endif %}
</div>
{% endblock %}

{% block scripts %}
<script>
    const treeData = JSON.parse(`{{ json_dt | tojson }}`)

    const svg = d3.select("#tree-svg");
    const g = svg.append("g");
    const currentWidth = () => document.getElementById("tree-container").clientWidth;
    const currentHeight = () => document.getElementById("tree-container").clientHeight;

    const NODE_W = 260, NODE_H = 70, SMALL_NODE_W = 100, SMALL_NODE_H = 40;

    const root = d3.hierarchy(treeData);

    const treeLayout = d3.tree()
        .nodeSize([NODE_W + 30, NODE_H + 40])
        .separation((a, b) => a.parent === b.parent ? 1 : 1.3);

    treeLayout(root);

    // Centra l'albero nella pagina
    const xs = root.descendants().map(d => d.x);
    const minX = Math.min(...xs), maxX = Math.max(...xs);
    const treeW = maxX - minX;
    g.attr("transform", `translate(${currentWidth() / 2 - treeW / 2 - minX}, 60)`);

    // Link tra i nodi
    const linkGen = d3.linkVertical().x(d => d.x).y(d => d.y + NODE_H / 2);

    const links = g.selectAll(".link")
        .data(root.links())
        .join("path")
        .attr("class", d => `link ${d.target.data.disabled ? 'disabled' : ''}`)
        .attr("d", d => linkGen({
            source: { x: d.source.x, y: d.source.y },
            target: { x: d.target.x, y: d.target.y }
        }));

    // Etichette dei link tra i nodi
    g.selectAll(".edge-label")
        .data(root.links())
        .join("text")
        .attr("class", d => `edge-label ${d.target.data.edge.toLowerCase()} ${d.target.data.disabled ? 'disabled' : ''}`)
        .attr("x", d => (d.source.x + d.target.x) / 2 - (30 * (d.target.x > d.source.x ? -1 : 1)))
        .attr("y", d => (d.source.y + d.target.y) / 2 + NODE_H / 2)
        .text(d => d.target.data.edge || "");

    // Nodi
    const nodes = g.selectAll(".node")
        .data(root.descendants())
        .join("g")
        .attr("class", d => `node ${d.data.type} ${d.data.disabled ? 'disabled' : ''}`)
        .attr("transform", d => `translate(${d.x - NODE_W / 2}, ${d.y})`);

    nodes.append("rect")
        .attr("width", d => d.data.desc.length > 10 ? NODE_W : SMALL_NODE_W)
        .attr("height", d => d.data.desc.length > 10 ? NODE_H : SMALL_NODE_H)
        .attr("x", d => d.data.desc.length > 10 ? 0 : (NODE_W - SMALL_NODE_W) / 2)
        .attr("y", d => d.data.desc.length > 10 ? 0 : (NODE_H - SMALL_NODE_H) / 2);

    // Separazione del testo su più linee
    nodes.append("text")
        .attr("x", NODE_W / 2)
        .attr("y", NODE_H / 2)
        .each(function (d) {
            const el = d3.select(this);
            const words = d.data.desc.split(" ");
            const part = Math.ceil(words.length / 3);
            const line1 = words.slice(0, part).join(" ");
            const line2 = words.slice(part, part * 2).join(" ");
            const line3 = words.slice(part * 2).join(" ");
            if (line2) {
                el.append("tspan").attr("x", NODE_W / 2).attr("dy", "-1.4em").attr("style", "font-weight:bold").text("DT.ACM-1." + d.data.name);
                el.append("tspan").attr("x", NODE_W / 2).attr("dy", "1.2em").text(line1);
                el.append("tspan").attr("x", NODE_W / 2).attr("dy", "1em").text(line2);
                el.append("tspan").attr("x", NODE_W / 2).attr("dy", "1em").text(line3);
            } else {
                el.text(d.data.name).attr("style", "font-weight:bold");
            }
        });

    // Evento click su un nodo
    nodes.on("click", function (event, d) {
        event.stopPropagation();
        // Controlla se il nodo cliccato è figlio sinistro (yes) del genitore, 
        // quindi primo figlio, oppure figlio destro (no), quindi secondo figlio.
        const isYesChild = d.parent.children[0] == d;
        // Reindirizza alla pagina di modifica automatica della risposta.
        // Una volta aggiornato il valore della risposta in automatico l'untente verrà reindirizzato su questa pagina.
        window.location.replace(`${window.location.href}/updatedt?set=${d.parent.data.name}&value=${isYesChild}`)
    });

    document.addEventListener("DOMContentLoaded", function() {
        document.getElementById("asset-select").addEventListener('change', function (event) {
            const deviceId = window.location.href.split('/')[3];
            window.location.replace(`${window.location.origin}/${deviceId}/dt/${event.target.value}/ACM-1`)
        });
    });
</script>
{% endblock %}

name: poc

services:
  app:
    build:
      context: .
      dockerfile: ./Dockerfile
    restart: unless-stopped
    ports:
      - 8080:8080
    links:
      - mongo
    environment:
      DB_HOST: mongo
      DB_PORT: 27017
      DB_USER: root
      DB_PASSWORD: grouprubberduckpoc2026

  mongo:
    image: mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: grouprubberduckpoc2026

  vue_builder:
    image: node:20-alpine
    container_name: vue_watcher
    working_dir: /app/frontend

    volumes:
      - ./:/app

    command: sh -c "npm install && npm run watch"